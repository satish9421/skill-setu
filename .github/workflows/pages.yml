name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy static files to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: |
            node_modules/**
            server.js
            .env
            package.json
            package-lock.json
            render.yaml
            netlify.toml
            .cfignore
            .gitignore
            *.bat
            public/uploads/**
            .github/**
            DOCUMENTATION.md
            README.md
            SETUP_GUIDE.md
